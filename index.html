<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MyGM Family Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111827; color:white; margin:0; }
    header { background:#1f2937; padding:20px; text-align:center; }
    nav { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; padding:15px; background:#374151; }
    button { padding:10px 14px; border:0; border-radius:8px; cursor:pointer; font-weight:bold; }
    .tab-btn { background:#facc15; }
    .danger { background:#ef4444; color:white; }
    .save { background:#22c55e; color:white; }
    .card { background:#1f2937; margin:20px auto; padding:20px; border-radius:12px; max-width:1200px; }
    input, select, textarea { width:100%; padding:10px; margin:6px 0 14px; border-radius:6px; border:0; box-sizing:border-box; }
    table { width:100%; border-collapse:collapse; margin-top:15px; }
    th, td { border-bottom:1px solid #4b5563; padding:10px; text-align:left; }
    .hidden { display:none; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:15px; }
    .budget-box { background:#111827; padding:12px; border-radius:10px; margin-bottom:10px; }
    .pill { display:inline-block; padding:4px 8px; border-radius:20px; background:#374151; margin:2px; }
    .draft-card { background:#111827; padding:15px; border-radius:10px; margin-top:15px; }
  </style>
</head>
<body>

<header>
  <h1>MyGM Family Tracker</h1>
  <p>Draft. Manage rosters. Track feuds. Remember your chaos.</p>
</header>

<nav>
  <button class="tab-btn" onclick="showTab('setup')">League Setup</button>
  <button class="tab-btn" onclick="showTab('draft')">Draft Room</button>
  <button class="tab-btn" onclick="showTab('roster')">Roster</button>
  <button class="tab-btn" onclick="showTab('history')">Draft History</button>
  <button class="tab-btn" onclick="showTab('feuds')">Feuds</button>
  <button class="save" onclick="saveData()">Save</button>
  <button class="danger" onclick="resetData()">Reset</button>
</nav>

<section id="setup" class="card">
  <h2>League Setup</h2>

  <label>Season Name</label>
  <input id="seasonName" placeholder="Example: Brown Family WWE 2K26 Season">

  <div class="grid">
    <div>
      <h3>Player 1</h3>
      <label>Brand</label><select id="brand1"></select>
      <label>GM</label><select id="gm1"></select>
      <label>Starting Budget</label><select id="budget1"></select>
    </div>
    <div>
      <h3>Player 2</h3>
      <label>Brand</label><select id="brand2"></select>
      <label>GM</label><select id="gm2"></select>
      <label>Starting Budget</label><select id="budget2"></select>
    </div>
    <div>
      <h3>Player 3</h3>
      <label>Brand</label><select id="brand3"></select>
      <label>GM</label><select id="gm3"></select>
      <label>Starting Budget</label><select id="budget3"></select>
    </div>
  </div>

  <button class="save" onclick="saveSetup()">Save Setup</button>
</section>

<section id="draft" class="card hidden">
  <h2>Draft Room</h2>

  <div id="budgetDisplay" class="grid"></div>

  <label>Filter Superstars</label>
  <input id="searchBox" placeholder="Search name, class, role, gender..." oninput="renderAvailableRoster()">

  <div class="grid">
    <div>
      <label>Available Superstars</label>
      <select id="availableRoster" size="15" onchange="showSelectedSuperstar()"></select>
    </div>

    <div>
      <div id="selectedCard" class="draft-card">
        <h3>Select a superstar</h3>
      </div>

      <label>Draft To Brand</label>
      <select id="draftBrand"></select>

      <label>Superstar Cost</label>
      <input id="draftCost" type="number" placeholder="Example: 275000">

      <button class="save" onclick="draftSelectedSuperstar()">Draft Superstar</button>
    </div>
  </div>
</section>

<section id="roster" class="card hidden">
  <h2>Roster Management</h2>
  <div id="rosterCards"></div>
</section>

<section id="history" class="card hidden">
  <h2>Draft History</h2>
  <table>
    <thead>
      <tr><th>Pick</th><th>Brand</th><th>Superstar</th><th>Cost</th><th>Remaining Budget</th></tr>
    </thead>
    <tbody id="historyTable"></tbody>
  </table>
</section>

<section id="feuds" class="card hidden">
  <h2>Feud Tracker</h2>

  <label>Brand</label>
  <select id="feudBrand"></select>

  <label>Wrestler / Team 1</label>
  <input id="feudOne" placeholder="LA Knight">

  <label>Wrestler / Team 2</label>
  <input id="feudTwo" placeholder="Logan Paul">

  <label>Feud Notes</label>
  <textarea id="feudNotes" placeholder="Started after a promo. Blowoff planned at SummerSlam."></textarea>

  <button class="save" onclick="addFeud()">Add Feud</button>

  <table>
    <thead>
      <tr><th>Brand</th><th>Feud</th><th>Notes</th></tr>
    </thead>
    <tbody id="feudTable"></tbody>
  </table>
</section>

let data = { setup:{}, roster:[], feuds:[], draftHistory:[] };

function money(n){ return "$" + Number(n || 0).toLocaleString(); }

function populateSetupDropdowns(){
  [1,2,3].forEach(i=>{
    document.getElementById("brand"+i).innerHTML = `<option value="">Select Brand</option>` + brandOptions.map(x=>`<option>${x}</option>`).join("");
    document.getElementById("gm"+i).innerHTML = `<option value="">Select GM</option>` + gmOptions.map(x=>`<option>${x}</option>`).join("");
    document.getElementById("budget"+i).innerHTML = budgetOptions.map(x=>`<option value="${x}">${money(x)}</option>`).join("");
  });
}

function showTab(tab) {
  document.querySelectorAll("section").forEach(s => s.classList.add("hidden"));
  document.getElementById(tab).classList.remove("hidden");
  renderAll();
}

function saveSetup() {
  const brands = [1,2,3].map(i => ({
    name: document.getElementById("brand"+i).value,
    gm: document.getElementById("gm"+i).value,
    startingBudget: Number(document.getElementById("budget"+i).value),
    remainingBudget: data.setup.brands?.[i-1]?.remainingBudget ?? Number(document.getElementById("budget"+i).value)
  })).filter(b => b.name && b.gm);

  const brandNames = brands.map(b=>b.name);
  const gmNames = brands.map(b=>b.gm);

  if (new Set(brandNames).size !== brandNames.length) return alert("Each brand can only be selected once.");
  if (new Set(gmNames).size !== gmNames.length) return alert("Each GM can only be selected once.");

  data.setup = { seasonName: document.getElementById("seasonName").value, brands };
  saveData();
  renderAll();
  alert("League setup saved!");
}

function renderBrandDropdowns() {
  const brands = data.setup.brands || [];
  ["draftBrand","feudBrand"].forEach(id=>{
    const drop = document.getElementById(id);
    drop.innerHTML = brands.map(b=>`<option value="${b.name}">${b.name} - ${b.gm}</option>`).join("");
  });
}

function renderBudgetDisplay(){
  const area = document.getElementById("budgetDisplay");
  area.innerHTML = (data.setup.brands || []).map(b=>`
    <div class="budget-box">
      <strong>${b.name}</strong><br>
      GM: ${b.gm}<br>
      Starting: ${money(b.startingBudget)}<br>
      Remaining: <strong>${money(b.remainingBudget)}</strong>
    </div>
  `).join("");
}

function renderAvailableRoster(){
  const search = document.getElementById("searchBox")?.value?.toLowerCase() || "";
  const draftedNames = data.roster.map(w=>w.name);
  const available = fullRoster
    .filter(w => w.status === "Active")
    .filter(w => !draftedNames.includes(w.name))
    .filter(w => JSON.stringify(w).toLowerCase().includes(search))
    .sort((a,b)=>b.pop-a.pop);

  const select = document.getElementById("availableRoster");
  select.innerHTML = available.map(w=>`
    <option value="${w.name}">
      ${w.name} | ${w.gender} | ${w.role} | ${w.classType} | Pop ${w.pop}
    </option>
  `).join("");
}

function showSelectedSuperstar(){
  const name = document.getElementById("availableRoster").value;
  const w = fullRoster.find(x=>x.name===name);
  if (!w) return;

  document.getElementById("selectedCard").innerHTML = `
    <h3>${w.name}</h3>
    <span class="pill">${w.gender}</span>
    <span class="pill">${w.role}</span>
    <span class="pill">${w.classType}</span>
    <p>Popularity: ${w.pop}</p>
    <p>Ring Level: ${w.ring}</p>
    <p>Promo Skill: ${w.promo}</p>
  `;
}

function draftSelectedSuperstar(){
  const name = document.getElementById("availableRoster").value;
  const brandName = document.getElementById("draftBrand").value;
  const cost = Number(document.getElementById("draftCost").value);

  const wrestler = fullRoster.find(w=>w.name===name);
  const brand = data.setup.brands.find(b=>b.name===brandName);

  if (!wrestler) return alert("Select a superstar first.");
  if (wrestler.status !== "Active") return alert("Contract wrestlers cannot be drafted.");
  if (!brand) return alert("Select a brand.");
  if (!cost || cost <= 0) return alert("Enter the superstar cost.");
  if (cost > brand.remainingBudget) return alert(`${brand.name} only has ${money(brand.remainingBudget)} left.`);

  brand.remainingBudget -= cost;

  data.roster.push({...wrestler, brand:brand.name, cost});
  data.draftHistory.push({
    pick:data.draftHistory.length + 1,
    brand:brand.name,
    superstar:wrestler.name,
    cost,
    remainingBudget:brand.remainingBudget
  });

  document.getElementById("draftCost").value = "";
  saveData();
  renderAll();
}

function renderRoster() {
  const area = document.getElementById("rosterCards");
  area.innerHTML = "";

  (data.setup.brands || []).forEach(b => {
    const members = data.roster.filter(w => w.brand === b.name);
    area.innerHTML += `
      <h3>${b.name} — GM: ${b.gm} — Remaining: ${money(b.remainingBudget)}</h3>
      <table>
        <thead><tr><th>Name</th><th>Gender</th><th>Role</th><th>Class</th><th>Popularity</th><th>Cost</th></tr></thead>
        <tbody>
          ${members.map(w => `
            <tr>
              <td>${w.name}</td><td>${w.gender}</td><td>${w.role}</td><td>${w.classType}</td><td>${w.pop}</td><td>${money(w.cost)}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  });
}

function renderHistory(){
  document.getElementById("historyTable").innerHTML = data.draftHistory.map(h=>`
    <tr><td>${h.pick}</td><td>${h.brand}</td><td>${h.superstar}</td><td>${money(h.cost)}</td><td>${money(h.remainingBudget)}</td></tr>
  `).join("");
}

function addFeud() {
  const feud = {
    brand: document.getElementById("feudBrand").value,
    one: document.getElementById("feudOne").value,
    two: document.getElementById("feudTwo").value,
    notes: document.getElementById("feudNotes").value
  };
  if (!feud.one || !feud.two) return alert("Add both sides of the feud.");
  data.feuds.push(feud);
  document.getElementById("feudOne").value = "";
  document.getElementById("feudTwo").value = "";
  document.getElementById("feudNotes").value = "";
  saveData();
  renderAll();
}

function renderFeuds() {
  document.getElementById("feudTable").innerHTML = data.feuds.map(f=>`
    <tr><td>${f.brand}</td><td>${f.one} vs ${f.two}</td><td>${f.notes}</td></tr>
  `).join("");
}

function renderAll() {
  renderBrandDropdowns();
  renderBudgetDisplay();
  renderAvailableRoster();
  renderRoster();
  renderHistory();
  renderFeuds();
}

function saveData() {
  localStorage.setItem("mygmFamilyTrackerV2", JSON.stringify(data));
}

function loadData() {
  populateSetupDropdowns();
  const saved = localStorage.getItem("mygmFamilyTrackerV2");
  if (saved) data = JSON.parse(saved);

  document.getElementById("seasonName").value = data.setup.seasonName || "";

  if (data.setup.brands) {
    data.setup.brands.forEach((b,idx)=>{
      const i = idx+1;
      document.getElementById("brand"+i).value = b.name || "";
      document.getElementById("gm"+i).value = b.gm || "";
      document.getElementById("budget"+i).value = b.startingBudget || 3000000;
    });
  }

  renderAll();
}

function resetData() {
  if (confirm("This will erase your saved MyGM season on this browser. Are you sure?")) {
    localStorage.removeItem("mygmFamilyTrackerV2");
    location.reload();
  }
}

loadData();
</script>

</html>
